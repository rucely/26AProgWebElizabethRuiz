<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Propiedades Tipográficas</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <p>aqui se vieron algunas propiedades</p>
  <!-- TAMAÑO -->
  <p class="normal">font-size: 1rem (tamaño)</p>

  <!-- PESO -->
  <p class="light">font-weight: 300 (peso de la fuente)</p>
  <p class="bold">font-weight: 700 (peso de la fuente)</p>

  <!-- INTERLINEADO -->
  <p class="compact">line-height (espacios entre lineas): 1<br />Línea 2<br />Línea 3</p>
  <p class="spaced">line-height (espacios entre lineas): 2<br />Línea 2<br />Línea 3</p>

  <!-- ESTILO -->
  <p class="italic">font-style (estilo especifico): italic</p>
  
</body>

</html>
