<!DOCTYPE html>
<html lang="en">

    <title>Imágenes</title>

<body>
    <h1>Conozca a los MaMi</h1>
    <p>Esta práctica se trató de añadir imagenes y concoer los formatos y herramientas que normalmente se utilizan para que tengan un menor peso y tamaño, además de como añadirles una pequeña descripcion y asi</p>
    <figure>
        <img src="img/losmami (1).jpeg" alt="Perros bonitos" width="640" height="426">
        <figcaption>Los MaMi (Marlin y Miku)</figcaption>

        <img src="img/mikuseria (1).jpeg" alt="Miku seria" width="640" height="426">
        <figcaption>Miku seria porque se queria salir de mi cuarto</figcaption>

        <img src="img/marlinapachurrado (1).jpeg" alt="marlin apachurrado" width="640" height="426">
        <figcaption>Marlin con la cara apachurrada porque no lo dejabamos pasar</figcaption>
    </figure>
