<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
</head>
<body>
    <table>
        <thead>
            <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
        </tr>
        </thead>

        <tbody>
            <tr>
                <td>Laptop</td>
                <td>$25,000</td>
                <td>1</td>
            </tr>

            <tr>
                <td>Memoria RAM</td>
                <td>$15,000</td>
                <td>2</td>
            </tr>

            <tr>
                <td>Silla hergonomica</td>
                <td>$8,000</td>
                <td>9</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th>total</th>
                <th colspan="2">mucho dinero</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
