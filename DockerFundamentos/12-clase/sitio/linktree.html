<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ely | Linktree</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EAE6DF; 
            margin: 0;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Foto de perfil */
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #5C715E; /* Verde bosque */
            object-fit: cover;
            border: 3px solid #333;
        }

        .profile-name {
            font-size: 1.5rem;
            color: #333;
            margin: 15px 0 5px 0;
        }

        .profile-bio {
            font-size: 1rem;
            color: #666;
            margin: 0;
        }

        /* Contenedor de los botones */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Diseño de los botones */
        .link-btn {
            background-color: transparent;
            color: #333;
            text-decoration: none;
            padding: 18px 20px;
            border: 2px solid #333;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 4px 4px 0px #333; /* Efecto retro/moderno */
        }

        .link-btn:hover {
            background-color: #333;
            color: #fff;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #333;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="/CursosPlatzi_RuizElizabeth\DockerFundamentos\12-clase\sitio\assets\pom.jpeg" alt="Elizabeth Ruiz" class="profile-pic">
        <h1 class="profile-name">Elizabeth Ruiz</h1>
        <p class="profile-bio">Ing. Sistemas Computacionales | ITSJ</p>
    </div>

    <div class="links-container">
        <a href="#" class="link-btn">👩‍💻 Mi GitHub</a>
        <a href="#" class="link-btn">🚀 Proyectos Dev (VAD, CARnelitas)</a>
        <a href="#" class="link-btn">⚜️ Scouts Vallarta</a>
        <a href="#" class="link-btn">⛰️ Rutas de Senderismo</a>
        <a href="#" class="link-btn">🎵 Playlist para programar</a>
    </div>

</body>
</html>
